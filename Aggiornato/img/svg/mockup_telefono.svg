    <linearGradient id="ring-grad" cx="50%" cy="50%" r="50%" gradientUnits="objectBoundingBox" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ab8f0"/>
      <stop offset="100%" stop-color="#0a4a8a"/>
    </linearGradient>
    <clipPath id="screen-clip">
