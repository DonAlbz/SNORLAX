      <stop offset="100%" stop-color="#060e1c"/>
    </radialGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4ab8f0"/>
      <stop offset="100%" stop-color="#2a7aaa"/>
