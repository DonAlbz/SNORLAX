<svg width="100%" viewBox="0 0 520 340" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">

  <!-- Sfondo principale -->
  <rect width="520" height="340" rx="14" fill="#0a1628"/>
  <rect width="520" height="340" rx="14" fill="none" stroke="rgba(58,110,168,0.3)" stroke-width="1"/>

  <!-- Titlebar -->
  <rect width="520" height="38" rx="14" fill="#0f1f3d"/>
  <rect y="24" width="520" height="14" fill="#0f1f3d"/>
  <rect y="37" width="520" height="1" fill="rgba(58,110,168,0.25)"/>

  <!-- Dots – si accendono uno alla volta all'avvio -->
  <circle cx="20" cy="19" r="5" fill="#e05252" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.2s" begin="0.1s" fill="freeze"/>
  </circle>
  <circle cx="36" cy="19" r="5" fill="#d4a04a" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.2s" begin="0.25s" fill="freeze"/>
  </circle>
  <circle cx="52" cy="19" r="5" fill="#4caf72" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.2s" begin="0.4s" fill="freeze"/>
  </circle>

  <!-- Brand – fade in -->
  <text x="260" y="23" text-anchor="middle" font-size="11" fill="#6e96c4" letter-spacing="0.06em" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.5s" fill="freeze"/>
    Snorlax Dashboard · Nome_Utente
  </text>

  <!-- CARD 1 — Qualità sonno -->
  <rect x="12" y="50" width="234" height="78" rx="10" fill="#112038" stroke="rgba(58,110,168,0.25)" stroke-width="0.5" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.6s" fill="freeze"/>
  </rect>
  <!-- bordo glow on hover simulato – pulsa -->
  <rect x="12" y="50" width="234" height="78" rx="10" fill="none" stroke="#4d9be0" stroke-width="0.8" opacity="0">
    <animate attributeName="opacity" values="0;0.35;0" dur="4s" begin="2s" repeatCount="indefinite"/>
  </rect>
  <text x="26" y="68" font-size="8" fill="#6e96c4" letter-spacing="0.1em" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.7s" fill="freeze"/>
    QUALITÀ SONNO
  </text>
  <!-- numero conta su -->
  <text x="26" y="108" font-size="44" font-weight="300" fill="#aecfee" letter-spacing="-0.02em" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.7s" fill="freeze"/>
    87
  </text>
  <text x="72" y="108" font-size="14" fill="#6e96c4" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.8s" fill="freeze"/>
    %
  </text>

  <!-- CARD 2 — Ore totali -->
  <rect x="274" y="50" width="234" height="78" rx="10" fill="#112038" stroke="rgba(58,110,168,0.25)" stroke-width="0.5" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.75s" fill="freeze"/>
  </rect>
  <rect x="274" y="50" width="234" height="78" rx="10" fill="none" stroke="#4d9be0" stroke-width="0.8" opacity="0">
    <animate attributeName="opacity" values="0;0.35;0" dur="4s" begin="2.8s" repeatCount="indefinite"/>
  </rect>
  <text x="288" y="68" font-size="8" fill="#6e96c4" letter-spacing="0.1em" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.85s" fill="freeze"/>
    ORE TOTALI
  </text>
  <text x="288" y="108" font-size="44" font-weight="300" fill="#aecfee" letter-spacing="-0.02em" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.85s" fill="freeze"/>
    7.4
  </text>
  <text x="336" y="108" font-size="14" fill="#6e96c4" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.95s" fill="freeze"/>
    h
  </text>

  <!-- CARD 3 — Freq. cardiaca -->
  <rect x="12" y="140" width="234" height="78" rx="10" fill="#112038" stroke="rgba(58,110,168,0.25)" stroke-width="0.5" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.9s" fill="freeze"/>
  </rect>
  <rect x="12" y="140" width="234" height="78" rx="10" fill="none" stroke="#4d9be0" stroke-width="0.8" opacity="0">
    <animate attributeName="opacity" values="0;0.35;0" dur="4s" begin="3.6s" repeatCount="indefinite"/>
  </rect>
  <text x="26" y="158" font-size="8" fill="#6e96c4" letter-spacing="0.1em" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1s" fill="freeze"/>
    FREQ. CARDIACA
  </text>
  <!-- BPM – simula battito: leggero scale -->
  <text x="26" y="198" font-size="44" font-weight="300" fill="#aecfee" letter-spacing="-0.02em" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1s" fill="freeze"/>
    58
  </text>
  <text x="72" y="198" font-size="14" fill="#6e96c4" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.1s" fill="freeze"/>
    bpm
  </text>
  <!-- indicatore battito cardiaco -->
  <circle cx="210" cy="175" r="4" fill="#e05252" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.1s" begin="2s" fill="freeze"/>
    <animate attributeName="r" values="4;7;4" dur="0.8s" begin="2.1s" repeatCount="indefinite" calcMode="easeInOut"/>
    <animate attributeName="opacity" values="0.9;0.3;0.9" dur="0.8s" begin="2.1s" repeatCount="indefinite"/>
  </circle>

  <!-- CARD 4 — Sogni rilevati -->
  <rect x="274" y="140" width="234" height="78" rx="10" fill="#112038" stroke="rgba(58,110,168,0.25)" stroke-width="0.5" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.05s" fill="freeze"/>
  </rect>
  <rect x="274" y="140" width="234" height="78" rx="10" fill="none" stroke="#4d9be0" stroke-width="0.8" opacity="0">
    <animate attributeName="opacity" values="0;0.35;0" dur="4s" begin="4.4s" repeatCount="indefinite"/>
  </rect>
  <text x="288" y="158" font-size="8" fill="#6e96c4" letter-spacing="0.1em" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.15s" fill="freeze"/>
    SOGNI RILEVATI
  </text>
  <text x="288" y="198" font-size="44" font-weight="300" fill="#aecfee" letter-spacing="-0.02em" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.15s" fill="freeze"/>
    3
  </text>
  <text x="318" y="198" font-size="14" fill="#6e96c4" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.25s" fill="freeze"/>
    fase
  </text>

  <!-- CHART CARD -->
  <rect x="12" y="230" width="496" height="98" rx="10" fill="#112038" stroke="rgba(58,110,168,0.25)" stroke-width="0.5" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.3s" fill="freeze"/>
  </rect>
  <text x="26" y="248" font-size="8" fill="#6e96c4" letter-spacing="0.1em" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.4s" fill="freeze"/>
    FASI DEL SONNO — IERI NOTTE
  </text>

  <!-- Barre – crescono dal basso, ciascuna con ritardo sfasato -->
  <!-- base y = 318, height originali: 28,42,55,70,58,65,48,62,72,50,68,44,60,38,52 -->

  <rect x="26"  y="290" width="24" height="28" rx="3" fill="#1e4a80" transform="scale(1,0)" transform-origin="26 318" style="transform-origin: 26px 318px; transform-box: fill-box;">
    <animateTransform attributeName="transform" type="scale" values="1 0;1 1" dur="0.5s" begin="1.5s" fill="freeze" calcMode="easeInOut" additive="replace"/>
    <animate attributeName="y" values="318;290" dur="0.5s" begin="1.5s" fill="freeze" calcMode="easeInOut"/>
    <animate attributeName="height" values="0;28" dur="0.5s" begin="1.5s" fill="freeze" calcMode="easeInOut"/>
  </rect>

  <rect x="59"  y="276" width="24" height="42" rx="3" fill="#2a5c99">
    <animate attributeName="y" values="318;276" dur="0.5s" begin="1.58s" fill="freeze" calcMode="easeInOut"/>
    <animate attributeName="height" values="0;42" dur="0.5s" begin="1.58s" fill="freeze" calcMode="easeInOut"/>
  </rect>

  <rect x="92"  y="263" width="24" height="55" rx="3" fill="#3a7abf">
    <animate attributeName="y" values="318;263" dur="0.5s" begin="1.66s" fill="freeze" calcMode="easeInOut"/>
    <animate attributeName="height" values="0;55" dur="0.5s" begin="1.66s" fill="freeze" calcMode="easeInOut"/>
  </rect>

  <rect x="125" y="248" width="24" height="70" rx="3" fill="#4d9be0">
    <animate attributeName="y" values="318;248" dur="0.5s" begin="1.74s" fill="freeze" calcMode="easeInOut"/>
    <animate attributeName="height" values="0;70" dur="0.5s" begin="1.74s" fill="freeze" calcMode="easeInOut"/>
  </rect>

  <rect x="158" y="260" width="24" height="58" rx="3" fill="#3a7abf">
    <animate attributeName="y" values="318;260" dur="0.5s" begin="1.82s" fill="freeze" calcMode="easeInOut"/>
    <animate attributeName="height" values="0;58" dur="0.5s" begin="1.82s" fill="freeze" calcMode="easeInOut"/>
  </rect>

  <rect x="191" y="253" width="24" height="65" rx="3" fill="#4d9be0">
    <animate attributeName="y" values="318;253" dur="0.5s" begin="1.90s" fill="freeze" calcMode="easeInOut"/>
    <animate attributeName="height" values="0;65" dur="0.5s" begin="1.90s" fill="freeze" calcMode="easeInOut"/>
  </rect>

  <rect x="224" y="270" width="24" height="48" rx="3" fill="#2a5c99">
    <animate attributeName="y" values="318;270" dur="0.5s" begin="1.98s" fill="freeze" calcMode="easeInOut"/>
    <animate attributeName="height" values="0;48" dur="0.5s" begin="1.98s" fill="freeze" calcMode="easeInOut"/>
  </rect>

  <rect x="257" y="256" width="24" height="62" rx="3" fill="#4d9be0">
    <animate attributeName="y" values="318;256" dur="0.5s" begin="2.06s" fill="freeze" calcMode="easeInOut"/>
    <animate attributeName="height" values="0;62" dur="0.5s" begin="2.06s" fill="freeze" calcMode="easeInOut"/>
  </rect>

  <rect x="290" y="246" width="24" height="72" rx="3" fill="#3a7abf">
    <animate attributeName="y" values="318;246" dur="0.5s" begin="2.14s" fill="freeze" calcMode="easeInOut"/>
    <animate attributeName="height" values="0;72" dur="0.5s" begin="2.14s" fill="freeze" calcMode="easeInOut"/>
  </rect>

  <rect x="323" y="268" width="24" height="50" rx="3" fill="#2a5c99">
    <animate attributeName="y" values="318;268" dur="0.5s" begin="2.22s" fill="freeze" calcMode="easeInOut"/>
    <animate attributeName="height" values="0;50" dur="0.5s" begin="2.22s" fill="freeze" calcMode="easeInOut"/>
  </rect>

  <rect x="356" y="250" width="24" height="68" rx="3" fill="#4d9be0">
    <animate attributeName="y" values="318;250" dur="0.5s" begin="2.30s" fill="freeze" calcMode="easeInOut"/>
    <animate attributeName="height" values="0;68" dur="0.5s" begin="2.30s" fill="freeze" calcMode="easeInOut"/>
  </rect>

  <rect x="389" y="274" width="24" height="44" rx="3" fill="#2a5c99">
    <animate attributeName="y" values="318;274" dur="0.5s" begin="2.38s" fill="freeze" calcMode="easeInOut"/>
    <animate attributeName="height" values="0;44" dur="0.5s" begin="2.38s" fill="freeze" calcMode="easeInOut"/>
  </rect>

  <rect x="422" y="258" width="24" height="60" rx="3" fill="#3a7abf">
    <animate attributeName="y" values="318;258" dur="0.5s" begin="2.46s" fill="freeze" calcMode="easeInOut"/>
    <animate attributeName="height" values="0;60" dur="0.5s" begin="2.46s" fill="freeze" calcMode="easeInOut"/>
  </rect>

  <rect x="455" y="280" width="24" height="38" rx="3" fill="#1e4a80">
    <animate attributeName="y" values="318;280" dur="0.5s" begin="2.54s" fill="freeze" calcMode="easeInOut"/>
    <animate attributeName="height" values="0;38" dur="0.5s" begin="2.54s" fill="freeze" calcMode="easeInOut"/>
  </rect>

  <rect x="488" y="266" width="24" height="52" rx="3" fill="#2a5c99">
    <animate attributeName="y" values="318;266" dur="0.5s" begin="2.62s" fill="freeze" calcMode="easeInOut"/>
    <animate attributeName="height" values="0;52" dur="0.5s" begin="2.62s" fill="freeze" calcMode="easeInOut"/>
  </rect>

  <!-- shimmer line che scorre sulle barre dopo il caricamento -->
  <rect x="12" y="230" width="496" height="98" rx="10" fill="none" clip-path="url(#chart-clip)">
    <animate attributeName="opacity" values="0" dur="1s" fill="freeze"/>
  </rect>
  <defs>
    <clipPath id="chart-clip">
      <rect x="12" y="230" width="496" height="98" rx="10"/>
    </clipPath>
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="-496" y="230" width="496" height="98" fill="url(#shimmer)" clip-path="url(#chart-clip)" opacity="0">
    <animate attributeName="opacity" values="0;1;0" dur="0.6s" begin="3.2s" repeatCount="indefinite" repeatDur="indefinite">
      <animate attributeName="begin" values="3.2s" dur="6s" repeatCount="indefinite"/>
    </animate>
    <animate attributeName="x" values="-496;520" dur="1.2s" begin="3.2s" repeatCount="indefinite"/>
  </rect>

</svg>
